version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mathcampus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       mathcampus
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: devpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mathcampus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mathcampus_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node.js + Express) ───────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
      target: development
    container_name: mathcampus_api
    restart: unless-stopped
    environment:
      NODE_ENV:          development
      PORT:              4000
      DB_HOST:           postgres
      DB_PORT:           5432
      DB_NAME:           mathcampus
      DB_USER:           postgres
      DB_PASSWORD:       devpassword123
      REDIS_URL:         redis://redis:6379
      FRONTEND_URL:      http://localhost:5173
      JWT_ACCESS_SECRET: dev_access_secret_change_in_prod
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_prod
      JWT_ACCESS_EXPIRY:  15m
      JWT_REFRESH_EXPIRY: 7d
    ports:
      - "4000:4000"
    volumes:
      - ../backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  # ── Frontend (Vite dev server) ────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: development
    container_name: mathcampus_web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/v1
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # ── DB migration runner (runs then exits) ─────────────────
  migrate:
    image: postgres:15-alpine
    container_name: mathcampus_migrate
    environment:
      PGPASSWORD: devpassword123
    volumes:
      - ../database:/database
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        psql -h postgres -U postgres -d mathcampus -f /database/migrations/001_initial_schema.sql &&
        psql -h postgres -U postgres -d mathcampus -f /database/seeds/001_seed.sql &&
        echo 'Migrations & seeds applied.'
      "
    profiles: ["migrate"]

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: mathcampus_network
