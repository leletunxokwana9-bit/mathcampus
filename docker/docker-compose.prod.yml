version: '3.9'

# Production docker-compose.
# Intended for use on AWS EC2 with RDS + ElastiCache (external).
# Run: docker-compose -f docker-compose.prod.yml up -d

services:

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
      target: production
    image: mathcampus/backend:latest
    container_name: mathcampus_api
    restart: always
    environment:
      NODE_ENV:           production
      PORT:               4000
      DB_HOST:            ${DB_HOST}
      DB_PORT:            ${DB_PORT:-5432}
      DB_NAME:            ${DB_NAME}
      DB_USER:            ${DB_USER}
      DB_PASSWORD:        ${DB_PASSWORD}
      DB_SSL:             true
      REDIS_URL:          ${REDIS_URL}
      FRONTEND_URL:       ${FRONTEND_URL}
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY:  ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      GOOGLE_CLIENT_ID:   ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL:  ${GOOGLE_CALLBACK_URL}
      AWS_REGION:         ${AWS_REGION:-af-south-1}
      AWS_ACCESS_KEY_ID:  ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME:     ${S3_BUCKET_NAME}
      CLOUDFRONT_DOMAIN:  ${CLOUDFRONT_DOMAIN}
    expose:
      - "4000"
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        max_attempts: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
    image: mathcampus/frontend:latest
    container_name: mathcampus_web
    restart: always
    expose:
      - "80"

  nginx:
    image: nginx:1.25-alpine
    container_name: mathcampus_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

networks:
  default:
    name: mathcampus_prod
