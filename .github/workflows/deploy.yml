name: MathCampus CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: af-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.af-south-1.amazonaws.com
  BACKEND_IMAGE:  mathcampus/backend
  FRONTEND_IMAGE: mathcampus/frontend

jobs:
  # ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       mathcampus_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: test123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Run migrations (test DB)
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: mathcampus_test
          DB_USER: postgres
          DB_PASSWORD: test123
          PGPASSWORD: test123
        run: |
          psql -h localhost -U postgres -d mathcampus_test -f database/migrations/001_initial_schema.sql

      - name: Run backend tests
        env:
          NODE_ENV:           test
          DB_HOST:            localhost
          DB_NAME:            mathcampus_test
          DB_USER:            postgres
          DB_PASSWORD:        test123
          REDIS_URL:          redis://localhost:6379
          JWT_ACCESS_SECRET:  test_access_secret
          JWT_REFRESH_SECRET: test_refresh_secret
        run: npm test
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.mathcampus.co.za/v1

  # ────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_IMAGE:$GITHUB_SHA \
                       -t $ECR_REGISTRY/$BACKEND_IMAGE:latest \
                       -f docker/Dockerfile.backend \
                       --target production \
                       backend/
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:$GITHUB_SHA
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest

      - name: Build & push frontend image
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_IMAGE:$GITHUB_SHA \
                       -t $ECR_REGISTRY/$FRONTEND_IMAGE:latest \
                       -f docker/Dockerfile.frontend \
                       --target production \
                       --build-arg VITE_API_URL=https://api.mathcampus.co.za/v1 \
                       frontend/
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:$GITHUB_SHA
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/mathcampus

            # Pull latest images
            aws ecr get-login-password --region af-south-1 | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            docker pull ${{ env.ECR_REGISTRY }}/mathcampus/backend:latest
            docker pull ${{ env.ECR_REGISTRY }}/mathcampus/frontend:latest

            # Rolling restart (zero-downtime)
            docker-compose -f docker/docker-compose.prod.yml up -d --no-deps backend
            sleep 10
            docker-compose -f docker/docker-compose.prod.yml up -d --no-deps frontend
            docker-compose -f docker/docker-compose.prod.yml up -d nginx

            # Cleanup old images
            docker image prune -f

            echo "✅ Deploy complete: $(date)"

      - name: Notify Slack on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '🚀 MathCampus deployed to production successfully!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify Slack on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: '❌ MathCampus deployment FAILED. Check GitHub Actions.'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
